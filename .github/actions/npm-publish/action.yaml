name: "Publish npm package"
description: "Download release artifact and publish to npmjs.org with provenance"
inputs:
  artifact:
    description: "Tarball filename to download and publish (e.g. slsa.tar.gz)"
    required: true
  github-token:
    description: "GitHub token for downloading release assets"
    required: true
runs:
  using: "composite"
  steps:
    - name: "Install latest Node.js with correct .npmrc"
      uses: "actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238" # v6.2.0
      with:
        node-version: "latest"
        check-latest: true
        registry-url: "https://registry.npmjs.org"
        package-manager-cache: false
    - name: "Update npm CLI"
      shell: "bash"
      run: "npm install -g npm@latest"
    - name: "Download release artifact"
      shell: "bash"
      env:
        GITHUB_TOKEN: "${{ inputs.github-token }}"
        ARTIFACT: "${{ inputs.artifact }}"
      run: 'gh release download "$GITHUB_REF_NAME" --pattern "$ARTIFACT"'
    - name: "Publish to npmjs.org"
      shell: "bash"
      env:
        ARTIFACT: "${{ inputs.artifact }}"
      run: 'npm publish "$ARTIFACT" --access public --provenance'
