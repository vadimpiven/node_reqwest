name: "Build and test"
on:
  pull_request:
    types: ["opened", "reopened", "synchronize"]
    branches:
      - "main"
  push:
    branches:
      - "main"
  schedule:
    - cron: "32 4 * * *"
  workflow_dispatch: {}
permissions: {}
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  init:
    name: "Init"
    runs-on: "ubuntu-latest"
    permissions: {} # No permissions needed
    outputs:
      matrix: "${{ steps.init-workflow.outputs.matrix }}"
      env: "${{ steps.init-workflow.outputs.env }}"
      cache-key: "${{ steps.init-workflow.outputs.cache-key }}"
      test-coverage: "${{ steps.init-workflow.outputs.test-coverage }}"
      test-reports: "${{ steps.init-workflow.outputs.test-reports }}"
      docker-image: "${{ steps.init-workflow.outputs.docker-image }}"
      docker-service: "${{ steps.init-workflow.outputs.docker-service }}"
      docker-cache: "${{ steps.init-workflow.outputs.docker-cache }}"
      mise-version: "${{ steps.init-workflow.outputs.mise-version }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Init workflow constants"
        id: "init-workflow"
        uses: "./.github/actions/init-workflow"
  build-and-test:
    name: "Build and test"
    timeout-minutes: 45
    environment: "ci"
    permissions:
      contents: "read" # to fetch code
      packages: "write" # to push Docker images
      id-token: "write" # for OIDC authentication
    needs:
      - "init"
    strategy:
      fail-fast: false
      matrix: "${{ fromJSON(needs.init.outputs.matrix) }}"
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Setup development environment"
        uses: "./.github/actions/setup"
        with:
          env: "${{ needs.init.outputs.env }}"
          docker-image: "${{ needs.init.outputs.docker-image }}"
          docker-cache: "${{ needs.init.outputs.docker-cache }}"
          docker-service: "${{ needs.init.outputs.docker-service }}"
          cache-key: "${{ needs.init.outputs.cache-key }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          mise-version: "${{ needs.init.outputs.mise-version }}"
          dockerhub-username: "${{ vars.DOCKERHUB_USERNAME }}"
          dockerhub-token: "${{ secrets.DOCKERHUB_TOKEN }}"
      - name: "Build and test"
        uses: "./.github/actions/shell"
        with:
          docker-service: "${{ needs.init.outputs.docker-service }}"
          # zizmor's `impostor-commit` audit hits github.com via anonymous
          # git, which sporadically 401s under rate pressure (especially
          # on shared ARM runner IPs). Authenticating lifts that limit.
          gh-token: "${{ secrets.GITHUB_TOKEN }}"
          run: "mise run --force ci-test"
      - name: "Upload reports"
        uses: "./.github/actions/upload-reports"
        with:
          test-coverage: "${{ needs.init.outputs.test-coverage }}"
          test-reports: "${{ needs.init.outputs.test-reports }}"
  benchmark:
    name: "Performance regression"
    timeout-minutes: 60
    permissions:
      contents: "read" # to fetch code
      id-token: "write" # required for OIDC auth with CodSpeed
    needs:
      - "init"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      # CodSpeed wraps the bench command with Valgrind for instruction-counted
      # measurements; that supervisor must own the process, so this job runs
      # natively on the runner (not inside the dev container).
      - name: "Setup development environment"
        uses: "./.github/actions/setup-native"
        with:
          cache-key: "${{ needs.init.outputs.cache-key }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          mise-version: "${{ needs.init.outputs.mise-version }}"
      - name: "Setup mise"
        uses: "./.github/actions/shell-native"
        with:
          run: "mise setup"
      - name: "Build node"
        uses: "./.github/actions/shell-native"
        with:
          run: "mise run --force ci-build"
      - name: "Run benchmarks"
        uses: "CodSpeedHQ/action@3194d9a39c4d46684cb44bf7207fc56626aad8fd" # v4.15.1
        with:
          mode: "simulation"
          run: "pnpm -C packages/node exec vitest bench --run"
  zizmor:
    name: "Check CI scripts"
    timeout-minutes: 15
    permissions:
      contents: "read" # to fetch code
      security-events: "write" # to upload sarif results
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Run zizmor"
        uses: "zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d" # v0.5.6
        with:
          persona: "auditor"
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
  trivy:
    name: "Security scan"
    timeout-minutes: 15
    permissions:
      contents: "read" # to fetch code
      security-events: "write" # to upload sarif results
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Run Trivy vulnerability scanner"
        uses: "aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25" # v0.36.0
        with:
          trivy-config: "trivy.yaml"
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
      - name: "Upload Trivy scan results to GitHub Security tab"
        uses: "github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa" # v4.36.0
        with:
          sarif_file: "trivy-results.sarif"
