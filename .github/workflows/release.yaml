name: "Build and publish"
on:
  push:
    tags:
      - "v*"
permissions: {}
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  init:
    name: "Init"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "write" # for draft release creation
    outputs:
      matrix: "${{ steps.init-workflow.outputs.matrix }}"
      env: "${{ steps.init-workflow.outputs.env }}"
      cache-key: "${{ steps.init-workflow.outputs.cache-key }}"
      docker-image: "${{ steps.init-workflow.outputs.docker-image }}"
      docker-cache: "${{ steps.init-workflow.outputs.docker-cache }}"
      docker-service: "${{ steps.init-workflow.outputs.docker-service }}"
      mise-version: "${{ steps.init-workflow.outputs.mise-version }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Verify tag is on main"
        env:
          GH_TOKEN: "${{ github.token }}"
          GH_REPOSITORY: "${{ github.repository }}"
        run: |
          set -euo pipefail
          STATUS=$(gh api "repos/$GH_REPOSITORY/compare/main...$GITHUB_SHA" --jq '.status')
          case "$STATUS" in
            behind|identical) echo "Tag $GITHUB_REF_NAME is on main (status: $STATUS)" ;;
            *) echo "::error::Tag must point to a commit on main (got status: ${STATUS:-empty})"; exit 1 ;;
          esac
      - name: "Init workflow constants"
        id: "init-workflow"
        uses: "./.github/actions/init-workflow"
      - name: "Create draft release"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: 'gh release create "$GITHUB_REF_NAME" --draft --generate-notes'
  build-addon:
    name: "Build addon"
    timeout-minutes: 45
    permissions:
      contents: "write" # to upload release assets
      packages: "write" # to push Docker images
      id-token: "write" # for OIDC authentication
      attestations: "write" # for build provenance
    needs:
      - "init"
    strategy:
      fail-fast: false
      matrix: "${{ fromJSON(needs.init.outputs.matrix) }}"
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Setup development environment"
        uses: "./.github/actions/setup"
        with:
          env: "${{ needs.init.outputs.env }}"
          docker-image: "${{ needs.init.outputs.docker-image }}"
          docker-cache: "${{ needs.init.outputs.docker-cache }}"
          docker-service: "${{ needs.init.outputs.docker-service }}"
          cache-key: "${{ needs.init.outputs.cache-key }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          mise-version: "${{ needs.init.outputs.mise-version }}"
      - name: "Build node addon"
        uses: "./.github/actions/shell"
        with:
          docker-service: "${{ needs.init.outputs.docker-service }}"
          run: |
            pnpm -F "{packages/node}" run bump-version
            pnpm -F "{packages/node}" run ci-build
      - name: "Sign and notarize"
        uses: "./.github/actions/sign-notarize"
        with:
          binary-path: "${{ github.workspace }}/packages/node/dist/node_reqwest.node"
      - name: "Pack node addon"
        uses: "./.github/actions/shell"
        with:
          docker-service: "${{ needs.init.outputs.docker-service }}"
          run: 'pnpm -F "{packages/node}" run pack-addon'
      - name: "Attest build provenance"
        uses: "actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32" # v4.1.0
        with:
          subject-path: "packages/node/dist/*.gz"
      - name: "Upload node addon"
        shell: "bash"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: 'gh release upload "$GITHUB_REF_NAME" packages/node/dist/*.gz'
  build-packages:
    name: "Build packages"
    timeout-minutes: 30
    permissions:
      contents: "write" # to upload release assets
      packages: "write" # to push Docker images (if Linux runner)
      id-token: "write" # for OIDC authentication
      attestations: "write" # for build provenance
    needs:
      - "init"
      - "build-addon"
    if: "needs.build-addon.result == 'success'"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Setup development environment"
        uses: "./.github/actions/setup"
        with:
          env: "${{ needs.init.outputs.env }}"
          docker-image: "${{ needs.init.outputs.docker-image }}"
          docker-cache: "${{ needs.init.outputs.docker-cache }}"
          docker-service: "${{ needs.init.outputs.docker-service }}"
          cache-key: "${{ needs.init.outputs.cache-key }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          mise-version: "${{ needs.init.outputs.mise-version }}"
      - name: "Build and pack node package"
        uses: "./.github/actions/shell"
        with:
          docker-service: "${{ needs.init.outputs.docker-service }}"
          run: |
            pnpm -F "{packages/node}" run bump-version
            pnpm -F "{packages/node}" run build:ts
      - name: "Attest node build provenance"
        uses: "actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32" # v4.1.0
        with:
          subject-path: "packages/node/package.tar.gz"
      - name: "Upload pre-packed tarball"
        uses: "actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4" # v5.0.0
        with:
          name: "slsa-tarball"
          path: "packages/node/package.tar.gz"
      - name: "Upload docs artifact"
        uses: "actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9" # v5.0.0
        with:
          path: "packages/node/docs"
      - name: "Upload package and publish release"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          gh release upload "$GITHUB_REF_NAME" packages/node/package.tar.gz
          gh release edit "$GITHUB_REF_NAME" --draft=false
  publish:
    name: "Publish"
    needs:
      - "build-addon"
      - "build-packages"
    if: "needs.build-packages.result == 'success'"
    permissions:
      contents: "read" # to fetch reusable workflow repo
      id-token: "write" # sigstore OIDC + npm trusted publishing
      attestations: "write" # @actions/attest writes to the GitHub Attestations API
    uses: "vadimpiven/node-addon-slsa/.github/workflows/publish.yaml@29bbe43259d77f4bf05eb1971483a337e1320114" # v0.8.12
    with:
      access: "public"
      tarball-artifact: "slsa-tarball" # must match `upload-artifact` name in build-packages
      addons: |
        {
          "linux":  {
            "x64":   "https://github.com/vadimpiven/node_reqwest/releases/download/${{ github.ref_name }}/node_reqwest-${{ github.ref_name }}-linux-x64.node.gz",
            "arm64": "https://github.com/vadimpiven/node_reqwest/releases/download/${{ github.ref_name }}/node_reqwest-${{ github.ref_name }}-linux-arm64.node.gz"
          },
          "darwin": {
            "x64":   "https://github.com/vadimpiven/node_reqwest/releases/download/${{ github.ref_name }}/node_reqwest-${{ github.ref_name }}-darwin-x64.node.gz",
            "arm64": "https://github.com/vadimpiven/node_reqwest/releases/download/${{ github.ref_name }}/node_reqwest-${{ github.ref_name }}-darwin-arm64.node.gz"
          },
          "win32":  {
            "x64":   "https://github.com/vadimpiven/node_reqwest/releases/download/${{ github.ref_name }}/node_reqwest-${{ github.ref_name }}-win32-x64.node.gz",
            "arm64": "https://github.com/vadimpiven/node_reqwest/releases/download/${{ github.ref_name }}/node_reqwest-${{ github.ref_name }}-win32-arm64.node.gz"
          }
        }
  docs:
    name: "Deploy docs"
    needs: "publish"
    if: "needs.publish.result == 'success'"
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    permissions:
      pages: "write" # to deploy to GitHub Pages
      id-token: "write" # to verify the deployment originates from an appropriate source
    environment:
      name: "github-pages"
      url: "${{ steps.deploy.outputs.page_url }}"
    steps:
      - name: "Deploy to GitHub Pages"
        id: "deploy"
        uses: "actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128" # v5.0.0
  smoke-test:
    name: "Smoke test"
    timeout-minutes: 10
    permissions:
      contents: "read" # GITHUB_TOKEN for slsa postinstall
    needs:
      - "init"
      - "publish"
    if: "needs.publish.result == 'success'"
    strategy:
      fail-fast: false
      matrix: "${{ fromJSON(needs.init.outputs.matrix) }}"
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Install Node.js"
        uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
        with:
          node-version: "latest"
          check-latest: true
          package-manager-cache: false
      - name: "Wait for npm registry"
        shell: "bash"
        run: |
          version="${GITHUB_REF_NAME#v}"
          for i in {1..10}; do
            if npm view "node-reqwest@${version}" version >/dev/null 2>&1; then
              echo "Version ${version} available on attempt ${i}"
              exit 0
            fi
            echo "Attempt ${i}: not yet available, waiting 15s..."
            sleep 15
          done
          echo "Version ${version} not available after 10 attempts"
          exit 1
      - name: "Smoke test"
        shell: "bash"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          cd "$(mktemp -d)"
          npm init -y
          npm install "node-reqwest@${GITHUB_REF_NAME#v}"
