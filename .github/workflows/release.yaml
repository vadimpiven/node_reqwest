name: "Build and publish"
on:
  push:
    tags:
      - "v*"
permissions: {}
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  init:
    name: "Init"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "write" # for draft release creation
    outputs:
      matrix: "${{ steps.init-workflow.outputs.matrix }}"
      env: "${{ steps.init-workflow.outputs.env }}"
      cache-key: "${{ steps.init-workflow.outputs.cache-key }}"
      docker-image: "${{ steps.init-workflow.outputs.docker-image }}"
      docker-cache: "${{ steps.init-workflow.outputs.docker-cache }}"
      docker-service: "${{ steps.init-workflow.outputs.docker-service }}"
      mise-version: "${{ steps.init-workflow.outputs.mise-version }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Verify tag is on main"
        env:
          GH_TOKEN: "${{ github.token }}"
          GH_REPOSITORY: "${{ github.repository }}"
        run: |
          set -euo pipefail
          STATUS=$(gh api "repos/$GH_REPOSITORY/compare/main...$GITHUB_SHA" --jq '.status')
          case "$STATUS" in
            behind|identical) echo "Tag $GITHUB_REF_NAME is on main (status: $STATUS)" ;;
            *) echo "::error::Tag must point to a commit on main (got status: ${STATUS:-empty})"; exit 1 ;;
          esac
      - name: "Init workflow constants"
        id: "init-workflow"
        uses: "./.github/actions/init-workflow"
      - name: "Create draft release"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: 'gh release create "$GITHUB_REF_NAME" --draft --generate-notes'
  build-addon:
    name: "Build addon"
    timeout-minutes: 45
    environment: "ci"
    permissions:
      contents: "write" # to upload release assets
      packages: "write" # to push Docker images
      id-token: "write" # for OIDC authentication
      attestations: "write" # for build provenance
    needs:
      - "init"
    strategy:
      fail-fast: false
      matrix: "${{ fromJSON(needs.init.outputs.matrix) }}"
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Setup development environment"
        uses: "./.github/actions/setup"
        with:
          env: "${{ needs.init.outputs.env }}"
          docker-image: "${{ needs.init.outputs.docker-image }}"
          docker-cache: "${{ needs.init.outputs.docker-cache }}"
          docker-service: "${{ needs.init.outputs.docker-service }}"
          cache-key: "${{ needs.init.outputs.cache-key }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          mise-version: "${{ needs.init.outputs.mise-version }}"
          dockerhub-username: "${{ vars.DOCKERHUB_USERNAME }}"
          dockerhub-token: "${{ secrets.DOCKERHUB_TOKEN }}"
      - name: "Build node addon"
        uses: "./.github/actions/shell"
        with:
          docker-service: "${{ needs.init.outputs.docker-service }}"
          gh-token: "${{ secrets.GITHUB_TOKEN }}"
          run: |
            pnpm -C packages/node run bump-version
            pnpm -C packages/node run ci-build
      - name: "Sign and notarize"
        uses: "./.github/actions/sign-notarize"
        with:
          binary-path: "${{ github.workspace }}/packages/node/dist/node_reqwest.node"
          mac-cert-id: "${{ secrets.MAC_CERT_ID }}"
          mac-cert-base64: "${{ secrets.MAC_CERT_BASE64 }}"
          mac-cert-passwd: "${{ secrets.MAC_CERT_PASSWD }}"
          mac-api-key-base64: "${{ secrets.MAC_API_KEY_BASE64 }}"
          mac-api-key-id: "${{ secrets.MAC_API_KEY_ID }}"
          mac-api-key-issuer-id: "${{ secrets.MAC_API_KEY_ISSUER_ID }}"
      - name: "Pack node addon"
        uses: "./.github/actions/shell"
        with:
          docker-service: "${{ needs.init.outputs.docker-service }}"
          gh-token: "${{ secrets.GITHUB_TOKEN }}"
          run: 'pnpm -C packages/node run pack-addon'
      - name: "Generate Rust SBOM"
        uses: "./.github/actions/shell"
        with:
          docker-service: "${{ needs.init.outputs.docker-service }}"
          gh-token: "${{ secrets.GITHUB_TOKEN }}"
          run: "mise run sbom:rust"
      - name: "Attest build provenance"
        uses: "actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32" # v4.1.0
        with:
          subject-path: "packages/node/dist/*.gz"
      - name: "Attest Rust SBOM"
        uses: "actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26" # v4.1.0
        with:
          subject-path: "packages/node/dist/*.node.gz"
          sbom-path: "packages/node/dist/node_reqwest.cdx.json"
      - name: "Upload node addon"
        shell: "bash"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: 'gh release upload "$GITHUB_REF_NAME" packages/node/dist/*.gz'
  build-packages:
    name: "Build packages"
    timeout-minutes: 30
    environment: "ci"
    permissions:
      contents: "write" # to upload release assets
      packages: "write" # to push Docker images (if Linux runner)
      id-token: "write" # for OIDC authentication
      attestations: "write" # for build provenance
    needs:
      - "init"
      - "build-addon"
    if: "needs.build-addon.result == 'success'"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Setup development environment"
        uses: "./.github/actions/setup"
        with:
          env: "${{ needs.init.outputs.env }}"
          docker-image: "${{ needs.init.outputs.docker-image }}"
          docker-cache: "${{ needs.init.outputs.docker-cache }}"
          docker-service: "${{ needs.init.outputs.docker-service }}"
          cache-key: "${{ needs.init.outputs.cache-key }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          mise-version: "${{ needs.init.outputs.mise-version }}"
          dockerhub-username: "${{ vars.DOCKERHUB_USERNAME }}"
          dockerhub-token: "${{ secrets.DOCKERHUB_TOKEN }}"
      - name: "Build and pack node package"
        uses: "./.github/actions/shell"
        with:
          docker-service: "${{ needs.init.outputs.docker-service }}"
          gh-token: "${{ secrets.GITHUB_TOKEN }}"
          run: |
            pnpm -C packages/node run bump-version
            pnpm -C packages/node run build:ts
      - name: "Generate JS SBOM"
        uses: "./.github/actions/shell"
        with:
          docker-service: "${{ needs.init.outputs.docker-service }}"
          gh-token: "${{ secrets.GITHUB_TOKEN }}"
          run: "mise run sbom:js"
      - name: "Attest node build provenance"
        uses: "actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32" # v4.1.0
        with:
          subject-path: "packages/node/package.tar.gz"
      - name: "Attest JS SBOM"
        uses: "actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26" # v4.1.0
        with:
          subject-path: "packages/node/package.tar.gz"
          sbom-path: "packages/node/package.cdx.json"
      - name: "Upload pre-packed tarball"
        uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
        with:
          name: "slsa-tarball"
          path: "packages/node/package.tar.gz"
      - name: "Upload docs artifact"
        uses: "actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9" # v5.0.0
        with:
          path: "packages/node/docs"
      - name: "Upload package and publish release"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          gh release upload "$GITHUB_REF_NAME" packages/node/package.tar.gz
          gh release edit "$GITHUB_REF_NAME" --draft=false
  publish:
    name: "Publish"
    timeout-minutes: 10
    needs:
      - "build-addon"
      - "build-packages"
    if: "needs.build-addon.result == 'success' && needs.build-packages.result == 'success'"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      id-token: "write" # npm provenance via OIDC + npm trusted publishing
    steps:
      - name: "Install Node.js"
        uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
        with:
          node-version: "latest"
          check-latest: true
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: "Download pre-packed tarball"
        uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
        with:
          name: "slsa-tarball"
      - name: "Publish to npm"
        shell: "bash"
        run: "npm publish package.tar.gz --provenance --access public"
  docs:
    name: "Deploy docs"
    needs: "publish"
    if: "needs.publish.result == 'success'"
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    permissions:
      pages: "write" # to deploy to GitHub Pages
      id-token: "write" # to verify the deployment originates from an appropriate source
    environment:
      name: "github-pages"
      url: "${{ steps.deploy.outputs.page_url }}"
    steps:
      - name: "Deploy to GitHub Pages"
        id: "deploy"
        uses: "actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128" # v5.0.0
  smoke-test:
    name: "Smoke test"
    timeout-minutes: 10
    permissions:
      contents: "read" # GITHUB_TOKEN for slsa postinstall
    needs:
      - "init"
      - "publish"
    if: "needs.publish.result == 'success'"
    strategy:
      fail-fast: false
      matrix: "${{ fromJSON(needs.init.outputs.matrix) }}"
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Install Node.js"
        uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
        with:
          node-version: "latest"
          check-latest: true
          package-manager-cache: false
      - name: "Wait for npm registry"
        shell: "bash"
        run: |
          version="${GITHUB_REF_NAME#v}"
          for i in {1..20}; do
            if npm view "node-reqwest@${version}" version >/dev/null 2>&1; then
              echo "Version ${version} available on attempt ${i}"
              exit 0
            fi
            echo "Attempt ${i}: not yet available, waiting 15s..."
            sleep 15
          done
          echo "Version ${version} not available after 20 attempts"
          exit 1
      - name: "Smoke test"
        shell: "bash"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          cd "$(mktemp -d)"
          npm init -y
          npm install "node-reqwest@${GITHUB_REF_NAME#v}"
