packages:
  - packages/core
  - packages/meta
  - packages/node

allowBuilds:
  electron: true
  esbuild: true
  node-addon-slsa: true

blockExoticSubdeps: true

# required for `bump-version` script to not trigger packages reinstall
verifyDepsBeforeRun: false

catalog:
  "@codecov/vite-plugin": 2.0.1
  "@codspeed/vitest-plugin": 5.4.0
  "@playwright/test": 1.60.0
  "@taplo/cli": 0.7.0
  "@types/node": 25.9.1
  "@vitest/coverage-istanbul": 4.1.7
  electron: 42.2.0
  fd-lock: 2.1.1
  husky: 9.1.7
  markdownlint-cli2: 0.22.1
  monocart-reporter: 2.11.2
  oxfmt: 0.51.0
  oxlint: 1.66.0
  selfsigned: 5.5.0
  tsx: 4.22.3
  typedoc: 0.28.19
  typedoc-theme-oxide: 0.3.0
  typescript: 6.0.3
  undici: 8.3.0
  vite: 8.0.14
  vite-plugin-dts: 5.0.1
  vitest: 4.1.7

minimumReleaseAge: 1440

storeDir: .cache/native/pnpm

minimumReleaseAgeExclude:
  - node-addon-slsa

overrides:
  # Security floor for transitive deps that ask for old undici (codecov,
  # cheerio, @electron/get pull 6.x/7.x indirectly and we leave those at the
  # versions they were tested against). 6.23.0 patched a series of CVEs.
  undici@<6.23.0: ">=6.23.0"
  # CVE floor — older @isaacs/brace-expansion has a ReDoS.
  "@isaacs/brace-expansion": ">=5.0.1"

strictDepBuilds: true
