packages:
  - packages/core
  - packages/meta
  - packages/node

blockExoticSubdeps: true

catalog:
  '@codecov/vite-plugin': 2.0.1
  '@playwright/test': 1.59.1
  '@taplo/cli': 0.7.0
  '@types/node': 25.6.1
  '@vitest/coverage-istanbul': 4.1.5
  # electron 42 dropped postinstall binary download in favor of lazy fetch
  # via the bin script; playwright launches the module directly so the
  # lazy path never runs and tests fail with "Electron failed to install
  # correctly". Pinned to 41 until playwright supports the v42 model.
  electron: 41.4.0
  fd-lock: 2.1.1
  husky: 9.1.7
  markdownlint-cli2: 0.22.1
  monocart-reporter: 2.10.1
  oxfmt: 0.48.0
  oxlint: 1.63.0
  typedoc: 0.28.19
  typedoc-theme-oxide: 0.3.0
  typescript: 6.0.3
  undici: 8.2.0
  vite: 8.0.11
  vite-plugin-dts: 5.0.0
  vitest: 4.1.5

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - node-addon-slsa

onlyBuiltDependencies:
  - electron
  - esbuild
  - node-addon-slsa

overrides:
  undici@<6.23.0: '>=6.23.0'

strictDepBuilds: true
