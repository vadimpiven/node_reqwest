packages:
  - packages/core
  - packages/meta
  - packages/node

blockExoticSubdeps: true

catalog:
  '@codecov/vite-plugin': 2.0.1
  '@playwright/test': 1.60.0
  '@taplo/cli': 0.7.0
  '@types/node': 25.7.0
  '@vitest/coverage-istanbul': 4.1.6
  # Hold at 41.x: v42 dropped the auto-postinstall binary download in
  # favor of an explicit `install-electron` bin, which our docker CI
  # sandbox can't run with restricted outbound network.
  electron: 41.6.0
  fd-lock: 2.1.1
  husky: 9.1.7
  markdownlint-cli2: 0.22.1
  monocart-reporter: 2.11.2
  oxfmt: 0.49.0
  oxlint: 1.64.0
  typedoc: 0.28.19
  typedoc-theme-oxide: 0.3.0
  typescript: 6.0.3
  undici: 8.2.0
  vite: 8.0.13
  vite-plugin-dts: 5.0.0
  vitest: 4.1.6

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - node-addon-slsa

onlyBuiltDependencies:
  - electron
  - esbuild
  - node-addon-slsa

overrides:
  undici@<6.23.0: '>=6.23.0'

strictDepBuilds: true
